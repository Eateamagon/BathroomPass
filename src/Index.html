<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!--
    user-scalable=no prevents accidental pinch-zoom on the kiosk touchscreen.
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Digital Hall Pass</title>

  <!-- Bauhaus geometric sans-serif typeface -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;900&display=swap" rel="stylesheet">

  <style>
    /* ============================================================
       BASE RESET & BAUHAUS DESIGN TOKENS
       ============================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      /* Bauhaus Primary Palette */
      --red:         #D02020;
      --blue:        #1040C0;
      --yellow:      #F0C020;
      --black:       #121212;
      --white:       #FFFFFF;
      --bg:          #F0F0F0;
      --muted:       #E0E0E0;
      --green:       #1A7A3C;

      /* Borders & Shadows — constructivist, hard-edged */
      --border-sm:   2px;
      --border-lg:   4px;
      --shadow-sm:   3px 3px 0px 0px var(--black);
      --shadow-md:   6px 6px 0px 0px var(--black);
      --shadow-lg:   8px 8px 0px 0px var(--black);
    }

    html, body {
      height: 100%;
      font-family: 'Outfit', sans-serif;
      font-weight: 500;
      background: var(--bg);
      color: var(--black);
      user-select: none;
      -webkit-user-select: none;
    }

    /* ============================================================
       MAIN LAYOUT WRAPPER
       ============================================================ */
    #app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 40px;
      overflow-y: auto;
      position: relative;
    }

    /* Subtle dot grid background pattern — Bauhaus texture */
    #app::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(var(--black) 1px, transparent 1px);
      background-size: 24px 24px;
      opacity: 0.04;
      pointer-events: none;
      z-index: 0;
    }

    /* ============================================================
       SCREEN MANAGEMENT
       ============================================================ */
    .screen {
      display: none;
      width: 100%;
      max-width: 600px;
      position: relative;
      z-index: 1;
    }

    .screen.active {
      display: block;
      animation: fadeUp .2s ease-out both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0);   }
    }

    /* ============================================================
       BAUHAUS GEOMETRIC LOGO — three shapes as brand identity
       ============================================================ */
    .bauhaus-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .bauhaus-logo__circle {
      width: 16px;
      height: 16px;
      border-radius: 9999px;
      background: var(--red);
      border: var(--border-sm) solid var(--black);
    }

    .bauhaus-logo__square {
      width: 16px;
      height: 16px;
      border-radius: 0;
      background: var(--blue);
      border: var(--border-sm) solid var(--black);
    }

    .bauhaus-logo__triangle {
      width: 0;
      height: 0;
      border-left: 9px solid transparent;
      border-right: 9px solid transparent;
      border-bottom: 16px solid var(--yellow);
      position: relative;
    }

    /* ============================================================
       SHARED: SCHOOL BANNER — constructivist typography
       ============================================================ */
    .banner {
      text-align: center;
      padding: 16px 0 20px;
      border-bottom: var(--border-lg) solid var(--black);
      margin-bottom: 24px;
    }

    .banner__school {
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--blue);
    }

    .banner__title {
      font-size: 2.25rem;
      font-weight: 900;
      color: var(--black);
      text-transform: uppercase;
      letter-spacing: -0.03em;
      line-height: 0.9;
      margin: 6px 0;
    }

    .banner__sub {
      font-size: .9rem;
      font-weight: 500;
      color: var(--black);
      opacity: 0.6;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    /* Stripped-down banner for screens 3 & 4 — just the school name */
    .banner--compact {
      padding: 10px 0 12px;
      margin-bottom: 16px;
    }

    /* ============================================================
       SHARED: CARD — Bauhaus style with thick borders & hard shadow
       ============================================================ */
    .card {
      background: var(--white);
      border: var(--border-lg) solid var(--black);
      border-radius: 0;
      box-shadow: var(--shadow-lg);
      padding: 28px 24px;
      position: relative;
    }

    /* Geometric corner decoration on cards */
    .card::after {
      content: '';
      position: absolute;
      top: -4px;
      right: -4px;
      width: 12px;
      height: 12px;
      background: var(--red);
      border-radius: 9999px;
    }

    /* ============================================================
       SCREEN 1 — SEARCH
       ============================================================ */
    .search-wrap {
      position: relative;
      margin-bottom: 14px;
    }

    .search-wrap__icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.2rem;
      pointer-events: none;
    }

    #searchInput {
      width: 100%;
      padding: 16px 16px 16px 48px;
      font-family: 'Outfit', sans-serif;
      font-size: 1.15rem;
      font-weight: 500;
      border: var(--border-lg) solid var(--black);
      border-radius: 0;
      outline: none;
      color: var(--black);
      background: var(--white);
      transition: box-shadow .2s ease-out;
    }

    #searchInput:focus {
      box-shadow: var(--shadow-sm);
    }

    #searchInput::placeholder {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      font-weight: 700;
      font-size: .9rem;
    }

    /* Results list */
    #resultsList {
      border: var(--border-lg) solid var(--black);
      border-radius: 0;
      overflow: hidden;
      max-height: 380px;
      overflow-y: auto;
    }

    .result-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: var(--border-sm) solid var(--black);
      cursor: pointer;
      transition: background .15s ease-out, transform .15s ease-out;
      -webkit-tap-highlight-color: transparent;
    }

    .result-item:last-child { border-bottom: none; }

    .result-item:hover,
    .result-item:active {
      background: var(--yellow);
    }

    .result-item__name {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--black);
      text-transform: uppercase;
      letter-spacing: .02em;
    }

    .result-item__grade {
      font-size: .75rem;
      font-weight: 700;
      color: var(--white);
      background: var(--blue);
      padding: 4px 12px;
      border-radius: 0;
      border: var(--border-sm) solid var(--black);
      text-transform: uppercase;
      letter-spacing: .05em;
      white-space: nowrap;
    }

    #emptyState {
      text-align: center;
      padding: 28px;
      color: var(--black);
      font-size: .9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .03em;
      opacity: 0.5;
    }

    /* ============================================================
       SCREEN 2 — DESTINATION
       ============================================================ */
    .greeting {
      text-align: center;
      margin-bottom: 24px;
    }

    .greeting__hi {
      font-size: .85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--black);
      opacity: 0.5;
      margin-bottom: 2px;
    }

    .greeting__name {
      font-size: 2rem;
      font-weight: 900;
      color: var(--black);
      text-transform: uppercase;
      letter-spacing: -0.02em;
      line-height: 0.95;
    }

    .dest-label {
      text-align: center;
      font-size: .85rem;
      font-weight: 700;
      color: var(--black);
      text-transform: uppercase;
      letter-spacing: .12em;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: var(--border-sm) solid var(--black);
    }

    .dest-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Destination buttons — Bauhaus color-blocked, hard shadow */
    .dest-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 24px;
      border: var(--border-lg) solid var(--black);
      border-radius: 0;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--white);
      text-align: left;
      box-shadow: var(--shadow-md);
      transition: transform .15s ease-out, box-shadow .15s ease-out;
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }

    .dest-btn:active {
      transform: translate(4px, 4px);
      box-shadow: none;
    }

    .dest-btn:hover {
      opacity: 0.92;
    }

    .dest-btn__icon { font-size: 1.8rem; }

    /* Geometric shape indicators on each button */
    .dest-btn::after {
      content: '';
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
    }

    .dest-btn--bathroom {
      background: var(--blue);
    }

    .dest-btn--bathroom::after {
      width: 14px;
      height: 14px;
      border-radius: 9999px;
      background: var(--white);
      opacity: 0.3;
    }

    .dest-btn--nurse {
      background: var(--red);
    }

    .dest-btn--nurse::after {
      width: 14px;
      height: 14px;
      border-radius: 0;
      background: var(--white);
      opacity: 0.3;
    }

    .dest-btn--office {
      background: var(--yellow);
      color: var(--black);
    }

    .dest-btn--office::after {
      width: 14px;
      height: 14px;
      border-radius: 0;
      background: var(--black);
      opacity: 0.15;
      transform: translateY(-50%) rotate(45deg);
    }

    .back-btn {
      display: block;
      width: 100%;
      margin-top: 16px;
      padding: 14px;
      background: var(--white);
      border: var(--border-lg) solid var(--black);
      border-radius: 0;
      font-family: 'Outfit', sans-serif;
      font-size: .9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--black);
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: transform .15s ease-out, box-shadow .15s ease-out;
      -webkit-tap-highlight-color: transparent;
    }

    .back-btn:active {
      transform: translate(2px, 2px);
      box-shadow: none;
    }

    /* ============================================================
       SCREEN 3 — ACTIVE PASS
       ============================================================ */
    .pass-card {
      background: var(--white);
      border: var(--border-lg) solid var(--black);
      border-radius: 0;
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      position: relative;
    }

    /* Header — constructivist block; color set by JS via dest class */
    .pass-header {
      background: var(--blue);
      color: var(--white);
      text-align: center;
      padding: 28px 24px 24px;
      border-bottom: var(--border-lg) solid var(--black);
      position: relative;
      overflow: hidden;
      transition: background .2s ease-out;
    }

    .pass-header--bathroom { background: var(--blue); }
    .pass-header--nurse    { background: var(--red);  }
    .pass-header--office   { background: var(--black); }

    /* Decorative geometric shapes in pass header */
    .pass-header::before {
      content: '';
      position: absolute;
      top: -20px;
      right: -20px;
      width: 60px;
      height: 60px;
      border-radius: 9999px;
      background: var(--white);
      opacity: 0.1;
    }

    .pass-header::after {
      content: '';
      position: absolute;
      bottom: -15px;
      left: 20px;
      width: 30px;
      height: 30px;
      background: var(--yellow);
      opacity: 0.2;
      transform: rotate(45deg);
    }

    .pass-header__status {
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .15em;
      text-transform: uppercase;
      opacity: .7;
      margin-bottom: 8px;
      position: relative;
      z-index: 1;
    }

    .pass-header__name {
      font-size: 2.25rem;
      font-weight: 900;
      line-height: 0.9;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      position: relative;
      z-index: 1;
    }

    /* Body of the active pass card */
    .pass-body {
      padding: 28px 24px 32px;
      text-align: center;
    }

    /* Destination pill — Bauhaus style with border; color matches dest */
    .pass-dest {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 1.1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--white);
      background: var(--blue);
      padding: 10px 24px;
      border: var(--border-sm) solid var(--black);
      border-radius: 0;
      margin-bottom: 28px;
      box-shadow: var(--shadow-sm);
    }

    .pass-dest--bathroom { background: var(--blue);   color: var(--white); }
    .pass-dest--nurse    { background: var(--red);    color: var(--white); }
    .pass-dest--office   { background: var(--yellow); color: var(--black); }

    .pass-dest__icon { font-size: 1.4rem; }

    /* Timer */
    .timer-label {
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--black);
      opacity: 0.5;
      margin-bottom: 6px;
    }

    #timerDisplay {
      font-size: 5rem;
      font-weight: 900;
      color: var(--black);
      font-variant-numeric: tabular-nums;
      line-height: 1;
      letter-spacing: -0.04em;
      transition: color .2s ease-out;
    }

    #timerDisplay.is-alert { color: var(--red); }

    /* Warning banner — Bauhaus red block */
    #timerAlert {
      display: none;
      margin-top: 14px;
      padding: 10px 18px;
      background: var(--red);
      border: var(--border-sm) solid var(--black);
      border-radius: 0;
      color: var(--white);
      font-weight: 700;
      font-size: .85rem;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    #timerAlert.is-visible { display: block; }

    #timeOutLabel {
      margin-top: 18px;
      font-size: .8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--black);
      opacity: 0.4;
    }

    /* Return to Class button — bold red Bauhaus button */
    #returnBtn {
      display: block;
      width: 100%;
      margin-top: 28px;
      padding: 20px;
      background: var(--red);
      border: var(--border-lg) solid var(--black);
      border-radius: 0;
      color: var(--white);
      font-family: 'Outfit', sans-serif;
      font-size: 1.25rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .06em;
      cursor: pointer;
      box-shadow: var(--shadow-md);
      transition: transform .15s ease-out, box-shadow .15s ease-out;
      -webkit-tap-highlight-color: transparent;
    }

    #returnBtn:active {
      transform: translate(4px, 4px);
      box-shadow: none;
    }

    #returnBtn:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    /* ============================================================
       SCREEN 4 — SUCCESS / RETURNED
       ============================================================ */
    .success-card {
      text-align: center;
      padding: 40px 28px;
      position: relative;
    }

    /* Override the default card corner decoration for success — use green circle */
    .success-card.card::after {
      background: var(--green);
      border-radius: 9999px;
      width: 14px;
      height: 14px;
    }

    /* Decorative geometric composition on success card */
    .success-card::before {
      content: '';
      position: absolute;
      bottom: 16px;
      left: 16px;
      width: 20px;
      height: 20px;
      background: var(--yellow);
      transform: rotate(45deg);
      opacity: 0.3;
    }

    .success-card__icon {
      font-size: 3rem;
      margin-bottom: 12px;
      display: block;
    }

    .success-card__title {
      font-size: 2rem;
      font-weight: 900;
      color: var(--black);
      text-transform: uppercase;
      letter-spacing: -0.02em;
      line-height: 0.95;
      margin-bottom: 8px;
    }

    /* Green accent bar under title */
    .success-card__title::after {
      content: '';
      display: block;
      width: 60px;
      height: 4px;
      background: var(--green);
      margin: 8px auto 0;
    }

    .success-card__name {
      font-size: .9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--black);
      opacity: 0.6;
      margin-bottom: 6px;
    }

    .success-card__duration {
      font-size: .9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--black);
      opacity: 0.4;
      margin-bottom: 28px;
    }

    .next-btn {
      padding: 16px 40px;
      background: var(--green);
      color: var(--white);
      border: var(--border-lg) solid var(--black);
      border-radius: 0;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      cursor: pointer;
      box-shadow: var(--shadow-md);
      transition: transform .15s ease-out, box-shadow .15s ease-out;
      -webkit-tap-highlight-color: transparent;
    }

    .next-btn:active {
      transform: translate(4px, 4px);
      box-shadow: none;
    }

    #autoResetMsg {
      margin-top: 16px;
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--black);
      opacity: 0.25;
    }

    /* ============================================================
       LOADING OVERLAY — constructivist style
       ============================================================ */
    #loadingOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(240,240,240,.85);
      z-index: 50;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    #loadingOverlay.is-visible { display: flex; }

    .spinner {
      width: 48px;
      height: 48px;
      border: var(--border-lg) solid var(--muted);
      border-top-color: var(--red);
      border-right-color: var(--blue);
      border-radius: 0;
      animation: spin .6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-msg {
      font-size: .85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--black);
    }

    /* ============================================================
       TOAST — Bauhaus stark notification
       ============================================================ */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(120px);
      background: var(--black);
      color: var(--white);
      padding: 14px 24px;
      border: var(--border-sm) solid var(--black);
      border-radius: 0;
      font-family: 'Outfit', sans-serif;
      font-size: .85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      box-shadow: var(--shadow-sm);
      transition: transform .2s ease-out;
      z-index: 100;
      max-width: 92vw;
      text-align: center;
      white-space: pre-line;
    }

    #toast.is-error {
      background: var(--red);
      border-color: var(--black);
    }

    #toast.is-visible { transform: translateX(-50%) translateY(0); }

    /* ============================================================
       RESPONSIVE — scale borders/shadows on mobile
       ============================================================ */
    @media (max-width: 480px) {
      .banner__title {
        font-size: 1.75rem;
      }

      .pass-header__name {
        font-size: 1.75rem;
      }

      #timerDisplay {
        font-size: 3.5rem;
      }

      .dest-btn {
        padding: 16px 20px;
        font-size: 1.1rem;
      }
    }

  </style>
</head>

<body>

  <!-- ============================================================
       LOADING OVERLAY
       Shown while waiting for Apps Script server calls to complete.
       ============================================================ -->
  <div id="loadingOverlay" role="status" aria-live="polite">
    <div class="spinner"></div>
    <div class="loading-msg" id="loadingMsg">Please wait</div>
  </div>

  <!-- ============================================================
       TOAST NOTIFICATION
       Slides up from the bottom to show errors or confirmations.
       ============================================================ -->
  <div id="toast" role="alert" aria-live="assertive"></div>

  <!-- ============================================================
       MAIN APP WRAPPER
       ============================================================ -->
  <div id="app">

    <!-- ══════════════════════════════════════════════════════════
         SCREEN 1 — SEARCH
         Student types their name or 5-6 digit lunch number.
         ══════════════════════════════════════════════════════════ -->
    <div id="searchScreen" class="screen active">

      <div class="banner">
        <div class="bauhaus-logo">
          <div class="bauhaus-logo__circle"></div>
          <div class="bauhaus-logo__square"></div>
          <div class="bauhaus-logo__triangle"></div>
        </div>
        <div class="banner__school"><?= schoolName ?></div>
        <h1 class="banner__title">Digital<br>Hall Pass</h1>
        <p  class="banner__sub">Type your name or lunch number</p>
      </div>

      <div class="card">
        <div class="search-wrap">
          <span class="search-wrap__icon" aria-hidden="true">🔍</span>
          <input
            type="text"
            id="searchInput"
            placeholder="Name or lunch number"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="words"
            spellcheck="false"
            aria-label="Search for your name or lunch number"
          />
        </div>

        <!-- Student results appear here as the user types -->
        <div id="resultsList"  style="display:none;"  role="list"></div>
        <div id="emptyState"   style="display:none;">
          No students found — try a different spelling or your lunch number.
        </div>
      </div>

    </div><!-- /#searchScreen -->


    <!-- ══════════════════════════════════════════════════════════
         SCREEN 2 — DESTINATION SELECTION
         Three large, colour-coded buttons.
         ══════════════════════════════════════════════════════════ -->
    <div id="destinationScreen" class="screen">

      <div class="banner">
        <div class="bauhaus-logo">
          <div class="bauhaus-logo__circle"></div>
          <div class="bauhaus-logo__square"></div>
          <div class="bauhaus-logo__triangle"></div>
        </div>
        <div class="banner__school"><?= schoolName ?></div>
        <h1 class="banner__title">Digital<br>Hall Pass</h1>
      </div>

      <div class="card">
        <div class="greeting">
          <div class="greeting__hi">Welcome,</div>
          <div class="greeting__name" id="greetingName"></div>
        </div>

        <p class="dest-label">Where are you going?</p>

        <div class="dest-buttons">
          <button
            class="dest-btn dest-btn--bathroom"
            onclick="selectDestination('Bathroom')"
            aria-label="Bathroom">
            <span class="dest-btn__icon" aria-hidden="true">🚻</span>
            <span>Bathroom</span>
          </button>

          <button
            class="dest-btn dest-btn--nurse"
            onclick="selectDestination('Nurse')"
            aria-label="Nurse's Office">
            <span class="dest-btn__icon" aria-hidden="true">🩺</span>
            <span>Nurse's Office</span>
          </button>

          <button
            class="dest-btn dest-btn--office"
            onclick="selectDestination('Office')"
            aria-label="Main Office">
            <span class="dest-btn__icon" aria-hidden="true">🏫</span>
            <span>Main Office</span>
          </button>
        </div>

        <button class="back-btn" onclick="goBack()">&#8592; Back to Search</button>
      </div>

    </div><!-- /#destinationScreen -->


    <!-- ══════════════════════════════════════════════════════════
         SCREEN 3 — ACTIVE PASS
         Shows the student's name, destination, and a live timer.
         ══════════════════════════════════════════════════════════ -->
    <div id="activeScreen" class="screen">

      <div class="banner banner--compact">
        <div class="banner__school"><?= schoolName ?></div>
      </div>

      <div class="pass-card">

        <!-- Blue header with student name -->
        <div class="pass-header">
          <div class="pass-header__status">● Pass Active</div>
          <div class="pass-header__name" id="passStudentName"></div>
        </div>

        <div class="pass-body">

          <!-- Destination pill -->
          <div class="pass-dest">
            <span class="pass-dest__icon" id="passDestIcon" aria-hidden="true"></span>
            <span id="passDestText"></span>
          </div>

          <!-- Live timer -->
          <div class="timer-label">Time Away</div>
          <div id="timerDisplay" aria-live="off">00:00</div>

          <!--
            Timer alert — hidden until the student exceeds 5 minutes.
          -->
          <div id="timerAlert" role="alert">
            ⚠ Please return to class
          </div>

          <!-- Exact sign-out time for teacher reference -->
          <div id="timeOutLabel"></div>

          <!-- Large red return button -->
          <button id="returnBtn" onclick="returnToClass()">
            ← Return to Class
          </button>

        </div><!-- /.pass-body -->
      </div><!-- /.pass-card -->

    </div><!-- /#activeScreen -->


    <!-- ══════════════════════════════════════════════════════════
         SCREEN 4 — SUCCESS (RETURNED)
         Shown briefly after the student checks back in.
         Auto-resets to Screen 1 after 8 seconds.
         ══════════════════════════════════════════════════════════ -->
    <div id="successScreen" class="screen">

      <div class="banner banner--compact">
        <div class="banner__school"><?= schoolName ?></div>
      </div>

      <div class="card success-card">
        <div class="success-card__icon" aria-hidden="true">✅</div>
        <div class="success-card__title">Welcome Back</div>
        <div class="success-card__name"     id="successName"></div>
        <div class="success-card__duration" id="successDuration"></div>
        <button class="next-btn" onclick="resetKiosk()">
          Next Student →
        </button>
        <div id="autoResetMsg"></div>
      </div>

    </div><!-- /#successScreen -->

  </div><!-- /#app -->


  <script>
    // ============================================================
    //  CLIENT-SIDE STATE
    // ============================================================

    /** The student who is currently interacting with the kiosk. */
    let selectedStudent = null;     // { id, name, grade }

    /**
     * ISO timestamp returned by the server when the pass was issued.
     * We convert this to a Date object and use it to drive the live timer.
     * Using the server timestamp (instead of a local one) avoids clock-drift
     * if the Chromebook's clock is slightly off.
     */
    let passTimeOut = null;         // Date

    /** Handle returned by setInterval() for the live timer. */
    let timerInterval = null;

    /**
     * Handle returned by setTimeout() for the search debounce.
     * We wait 300 ms after the last keypress before hitting the server.
     */
    let searchDebounce = null;

    /** Handle for the auto-reset countdown on the success screen. */
    let autoResetTimeout = null;

    // ── Destination display helpers ──────────────────────────────
    const DEST_ICON  = { Bathroom: '🚻', Nurse: '🩺', Office: '🏫' };
    const DEST_LABEL = { Bathroom: 'Bathroom', Nurse: "Nurse's Office", Office: 'Main Office' };
    const DEST_CLASS = { Bathroom: 'bathroom', Nurse: 'nurse', Office: 'office' };


    // ============================================================
    //  SCREEN MANAGEMENT
    // ============================================================

    /**
     * Shows one screen and hides the rest.
     * @param {string} id  - The id attribute of the screen div.
     */
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      window.scrollTo({ top: 0, behavior: 'instant' });
    }


    // ============================================================
    //  LOADING OVERLAY
    // ============================================================

    function showLoading(msg) {
      document.getElementById('loadingMsg').textContent = msg || 'Please wait';
      document.getElementById('loadingOverlay').classList.add('is-visible');
    }

    function hideLoading() {
      document.getElementById('loadingOverlay').classList.remove('is-visible');
    }


    // ============================================================
    //  TOAST NOTIFICATIONS
    // ============================================================

    let _toastTimer = null;

    /**
     * Slides a message up from the bottom of the screen.
     * @param {string}  message  - Text to display.
     * @param {boolean} isError  - If true, uses a red background.
     * @param {number}  duration - How long to show it (ms).  Default 4500.
     */
    function showToast(message, isError, duration) {
      const el = document.getElementById('toast');
      el.textContent = message;
      el.className   = 'is-visible' + (isError ? ' is-error' : '');

      if (_toastTimer) clearTimeout(_toastTimer);
      _toastTimer = setTimeout(() => { el.className = ''; }, duration || 4500);
    }


    // ============================================================
    //  SCREEN 1 — SEARCH LOGIC
    // ============================================================

    document.getElementById('searchInput').addEventListener('input', function () {
      const q = this.value.trim();

      // Clear previous debounce
      if (searchDebounce) clearTimeout(searchDebounce);

      if (q.length < 2) {
        // Hide both the list and the empty-state message
        document.getElementById('resultsList').style.display  = 'none';
        document.getElementById('emptyState').style.display   = 'none';
        return;
      }

      // Wait 300 ms after typing stops before calling the server.
      // This reduces the number of round-trips when the student is
      // still in the middle of typing.
      searchDebounce = setTimeout(() => _doSearch(q), 300);
    });

    /** Calls the Apps Script searchStudents() function. */
    function _doSearch(query) {
      google.script.run
        .withSuccessHandler(_renderResults)
        .withFailureHandler(err => showToast('Search error — please try again.', true))
        .searchStudents(query);
    }

    /**
     * Builds the results list from the array returned by the server.
     * @param {Array<{id,name,grade}>} students
     */
    function _renderResults(students) {
      const list     = document.getElementById('resultsList');
      const empty    = document.getElementById('emptyState');
      list.innerHTML = '';

      if (!students || students.length === 0) {
        list.style.display  = 'none';
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';
      list.style.display  = 'block';

      students.forEach(student => {
        const item = document.createElement('div');
        item.className   = 'result-item';
        item.setAttribute('role', 'listitem');
        item.innerHTML   =
          '<span class="result-item__name">'  + _esc(student.name)              + '</span>' +
          '<span class="result-item__grade">Grade ' + _esc(String(student.grade)) + '</span>';

        // Using addEventListener keeps onclick out of the generated HTML
        // and avoids needing to pass complex objects as HTML attributes.
        item.addEventListener('click', () => _selectStudent(student));
        list.appendChild(item);
      });
    }

    /**
     * Called when the student taps their name in the results list.
     * Saves state and advances to the destination screen.
     *
     * @param {{ id, name, grade }} student
     */
    function _selectStudent(student) {
      selectedStudent = student;

      // Populate the greeting on the next screen
      document.getElementById('greetingName').textContent = student.name;

      // Clear the search field so it's fresh for the next user
      document.getElementById('searchInput').value       = '';
      document.getElementById('resultsList').style.display = 'none';
      document.getElementById('emptyState').style.display  = 'none';

      showScreen('destinationScreen');
    }


    // ============================================================
    //  SCREEN 2 — DESTINATION SELECTION
    // ============================================================

    /**
     * Called when the student taps one of the three destination buttons.
     * Issues the pass via Apps Script after server-side validation.
     *
     * @param {'Bathroom'|'Nurse'|'Office'} destination
     */
    function selectDestination(destination) {
      if (!selectedStudent) { resetKiosk(); return; }

      showLoading('Checking hallway capacity');

      google.script.run
        .withSuccessHandler(result => {
          hideLoading();
          if (result.success) {
            // Server approved — start the active-pass screen
            passTimeOut = new Date(result.timeOut);
            _showActivePass(selectedStudent, destination, passTimeOut);
          } else {
            // Server rejected — show the reason (e.g. capacity exceeded)
            showToast(result.message, true, 6000);
          }
        })
        .withFailureHandler(err => {
          hideLoading();
          showToast('Something went wrong. Please try again.', true);
          console.error('issuePass error:', err);
        })
        .issuePass(selectedStudent, destination);
    }

    /** "Back to Search" button handler. */
    function goBack() {
      selectedStudent = null;
      document.getElementById('searchInput').value        = '';
      document.getElementById('resultsList').style.display = 'none';
      document.getElementById('emptyState').style.display  = 'none';
      showScreen('searchScreen');
      // Small delay so the screen transition finishes before the keyboard pops
      setTimeout(() => document.getElementById('searchInput').focus(), 280);
    }


    // ============================================================
    //  SCREEN 3 — ACTIVE PASS & LIVE TIMER
    // ============================================================

    /**
     * Populates the active-pass card and starts the live timer.
     *
     * @param {{ id, name, grade }} student
     * @param {string}             destination
     * @param {Date}               timeOut       Server-issued timestamp
     */
    function _showActivePass(student, destination, timeOut) {
      // Populate card fields
      document.getElementById('passStudentName').textContent = student.name;
      document.getElementById('passDestIcon').textContent    = DEST_ICON[destination]  || '📍';
      document.getElementById('passDestText').textContent    = DEST_LABEL[destination] || destination;

      // Apply destination color to header and pill
      const destKey = DEST_CLASS[destination] || 'bathroom';
      const header  = document.querySelector('.pass-header');
      const pill    = document.querySelector('.pass-dest');
      header.className = 'pass-header pass-header--' + destKey;
      pill.className   = 'pass-dest pass-dest--' + destKey;

      // Format time-out label  e.g. "Signed out at 2:35 PM"
      const h    = timeOut.getHours();
      const min  = String(timeOut.getMinutes()).padStart(2, '0');
      const ampm = h >= 12 ? 'PM' : 'AM';
      const h12  = h % 12 || 12;
      document.getElementById('timeOutLabel').textContent =
        'Signed out at ' + h12 + ':' + min + ' ' + ampm;

      // Reset timer state
      document.getElementById('timerDisplay').textContent = '00:00';
      document.getElementById('timerDisplay').classList.remove('is-alert');
      document.getElementById('timerAlert').classList.remove('is-visible');
      document.getElementById('returnBtn').disabled = false;

      showScreen('activeScreen');
      _startTimer(timeOut);
    }

    /**
     * Starts an interval that updates the on-screen timer every second.
     * After 5 minutes (300 seconds) the timer turns bold-red.
     *
     * @param {Date} startTime
     */
    function _startTimer(startTime) {
      _stopTimer(); // clear any existing interval first

      timerInterval = setInterval(() => {
        const elapsed  = Math.floor((Date.now() - startTime.getTime()) / 1000);
        const mins     = Math.floor(elapsed / 60);
        const secs     = elapsed % 60;
        const display  = String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');

        const timerEl  = document.getElementById('timerDisplay');
        const alertEl  = document.getElementById('timerAlert');

        timerEl.textContent = display;

        // ── 5-MINUTE ALERT ──────────────────────────────────────
        if (elapsed >= 300) {           // 300 seconds = 5 minutes
          timerEl.classList.add('is-alert');
          alertEl.classList.add('is-visible');
        } else {
          timerEl.classList.remove('is-alert');
          alertEl.classList.remove('is-visible');
        }
      }, 1000);
    }

    function _stopTimer() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }


    // ============================================================
    //  SCREEN 4 — RETURN TO CLASS
    // ============================================================

    /**
     * Called when the student taps "Return to Class".
     * Calls the Apps Script returnStudent() function, which logs
     * the completed trip to the Pass Log sheet.
     */
    function returnToClass() {
      if (!selectedStudent) { resetKiosk(); return; }

      // Disable the button immediately to prevent double-taps
      document.getElementById('returnBtn').disabled = true;
      _stopTimer();

      showLoading('Logging your return');

      google.script.run
        .withSuccessHandler(result => {
          hideLoading();
          if (result.success) {
            _showSuccessScreen(selectedStudent.name, result.duration);
          } else {
            // Unexpected failure — let the student try again
            document.getElementById('returnBtn').disabled = false;
            showToast(result.message, true);
            _startTimer(passTimeOut); // restart the timer
          }
        })
        .withFailureHandler(err => {
          hideLoading();
          document.getElementById('returnBtn').disabled = false;
          showToast('Could not log your return. Please tell your teacher.', true);
          _startTimer(passTimeOut); // restart the timer
          console.error('returnStudent error:', err);
        })
        .returnStudent(selectedStudent.id);
    }

    /**
     * Fills in the success screen and sets an 8-second auto-reset.
     *
     * @param {string} name
     * @param {string} duration  e.g. "4.72 minutes" (from server)
     */
    function _showSuccessScreen(name, duration) {
      document.getElementById('successName').textContent     = name + ' has returned to class.';
      document.getElementById('successDuration').textContent =
        duration ? 'Total time away: ' + duration : '';

      showScreen('successScreen');

      // Auto-reset countdown
      let secs = 8;
      document.getElementById('autoResetMsg').textContent =
        'This screen will reset in ' + secs + ' seconds';

      const countInterval = setInterval(() => {
        secs--;
        if (secs > 0) {
          document.getElementById('autoResetMsg').textContent =
            'This screen will reset in ' + secs + ' seconds';
        } else {
          clearInterval(countInterval);
        }
      }, 1000);

      autoResetTimeout = setTimeout(() => {
        clearInterval(countInterval);
        resetKiosk();
      }, 8000);
    }


    // ============================================================
    //  RESET THE KIOSK
    //  Called manually by the "Done — Next Student" button,
    //  OR automatically after 8 seconds on the success screen.
    // ============================================================

    function resetKiosk() {
      // Cancel any pending timeouts/intervals
      _stopTimer();
      if (autoResetTimeout) { clearTimeout(autoResetTimeout); autoResetTimeout = null; }

      // Clear state
      selectedStudent = null;
      passTimeOut     = null;

      // Reset all form fields
      document.getElementById('searchInput').value        = '';
      document.getElementById('resultsList').style.display = 'none';
      document.getElementById('emptyState').style.display  = 'none';
      document.getElementById('returnBtn').disabled        = false;

      showScreen('searchScreen');

      // Restore keyboard focus to the search box
      setTimeout(() => document.getElementById('searchInput').focus(), 280);
    }


    // ============================================================
    //  UTILITY: XSS-safe HTML escaping
    //  Used whenever we insert untrusted (server-returned) text
    //  into innerHTML.  Direct textContent assignments are already safe.
    // ============================================================

    function _esc(str) {
      return String(str)
        .replace(/&/g,  '&amp;')
        .replace(/</g,  '&lt;')
        .replace(/>/g,  '&gt;')
        .replace(/"/g,  '&quot;')
        .replace(/'/g,  '&#039;');
    }


    // ============================================================
    //  KIOSK MODE HARDENING
    // ============================================================

    // Disable right-click context menu (prevents students from
    // inspecting or navigating away).
    document.addEventListener('contextmenu', e => e.preventDefault());

    // Auto-focus the search box when the page first loads.
    window.addEventListener('load', () => {
      setTimeout(() => document.getElementById('searchInput').focus(), 400);
    });

  </script>

</body>
</html>
